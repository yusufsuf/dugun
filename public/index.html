<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Medya Yukleme</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">


      <section class="workspace">
        <form id="upload-form" class="upload-card">
          <div class="card-head" style="justify-content: center; align-items: center; text-align: center; margin-bottom: 8px;">
            <h2 style="font-size: 2.2rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin: 0;">DÜĞÜNÜMÜZE HOŞGELDİNİZ</h2>
          </div>

          <div class="form-grid">
            <label class="field field-wide">
              <span>Ad Soyad</span>
              <input
                type="text"
                name="fullName"
                id="fullName"
                placeholder="Ornek: Ayse Yilmaz"
                required
              />
            </label>

            <label class="field field-wide dropzone" for="media">
              <span>Fotograf / Video Sec</span>
              <p class="dropzone-copy">
                Dosyalari surukleyip birakabilir veya tiklayarak secim
                yapabilirsiniz.
              </p>
              <input
                type="file"
                name="media"
                id="media"
                accept="image/*,video/*"
                multiple
                required
              />
            </label>
          </div>

          <div class="selection-box">
            <div class="selection-head">
              <strong>Secilen dosyalar</strong>
              <span class="selection-pill">Canli ozet</span>
            </div>
            <p id="selection-summary">Henuz dosya secilmedi.</p>
            <ul id="file-list" class="file-list"></ul>
          </div>

          <div class="action-row">
            <button type="submit" id="submit-button">Yükle ve Devam Et</button>
          </div>
        </form>
      </section>

      <section id="status-box" class="status-box" aria-live="polite"></section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
